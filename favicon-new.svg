<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="capG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4a261"/>
      <stop offset="50%" stop-color="#e6952e"/>
      <stop offset="100%" stop-color="#d4840a"/>
    </linearGradient>
  </defs>

  <rect width="100" height="100" rx="16" fill="#0d0a12"/>

  <!-- Graduation cap (centered, larger for favicon) -->
  <g transform="translate(50, 35)">
    <!-- Cap board -->
    <polygon points="0,-12 28,0 0,12 -28,0" fill="url(#capG)" stroke="#f4a261" stroke-width="2" stroke-linejoin="round"/>
    <!-- Cap base band -->
    <path d="M-16,0 L-16,6 Q0,16 16,6 L16,0" fill="none" stroke="#e6952e" stroke-width="2" stroke-linecap="round"/>
    <!-- Tassel -->
    <line x1="28" y1="0" x2="32" y2="14" stroke="#f4a261" stroke-width="2" stroke-linecap="round"/>
    <circle cx="32" cy="15.5" r="2.5" fill="#f4a261"/>
  </g>

  <!-- Text -->
  <text x="50" y="80" text-anchor="middle" font-family="'Inter', 'Arial Black', Arial, sans-serif" font-size="22" font-weight="900" fill="#e63946" letter-spacing="2">esgis</text>
</svg>
