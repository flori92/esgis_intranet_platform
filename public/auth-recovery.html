<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Réinitialisation du mot de passe</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f7f9fc;
        color: #0f172a;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(92vw, 480px);
        padding: 32px 28px;
        border-radius: 18px;
        background: #ffffff;
        box-shadow: 0 18px 44px rgba(15, 23, 42, 0.12);
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.2rem;
      }

      p {
        margin: 0;
        color: #475569;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Réinitialisation en cours</h1>
      <p>Redirection vers le formulaire sécurisé...</p>
    </main>

    <script>
      (function redirectToResetPassword() {
        const hash = window.location.hash.startsWith('#') ? window.location.hash.slice(1) : '';
        const search = window.location.search.startsWith('?') ? window.location.search.slice(1) : '';
        const params = new URLSearchParams(hash || search);
        const target = new URL(`${window.location.origin}/#/reset-password`);

        ['access_token', 'refresh_token', 'expires_in', 'expires_at', 'token_type', 'type', 'code'].forEach((key) => {
          const value = params.get(key);
          if (value) {
            target.searchParams.set(key, value);
          }
        });

        if (!target.searchParams.get('access_token') && !target.searchParams.get('code')) {
          target.searchParams.set('error', 'invalid_recovery_link');
        }

        window.location.replace(target.toString());
      })();
    </script>
  </body>
</html>
