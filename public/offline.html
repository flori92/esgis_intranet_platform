<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESGIS Campus — Hors ligne</title>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f5f5f5; color: #333; }
    .container { text-align: center; padding: 2rem; }
    h1 { color: #003366; font-size: 2rem; margin-bottom: 0.5rem; }
    p { color: #666; font-size: 1.1rem; }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    button { background: #003366; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 1rem; cursor: pointer; margin-top: 1rem; }
    button:hover { background: #004080; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&#128268;</div>
    <h1>Vous êtes hors ligne</h1>
    <p>La connexion Internet semble indisponible. Vérifiez votre connexion et réessayez.</p>
    <button onclick="location.reload()">Réessayer</button>
  </div>
</body>
</html>
